<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuderia Command v1.2.0</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div class="logo">
        🏎️ <span>Scuderia Command</span>
    </div>

    <div class="session">
        <h2>2026 Formula 1 Mission Control</h2>
        <p id="sessionName">Waiting for session...</p>
    </div>

    <div class="clock">
        <span id="clock">00:00:00</span>
    </div>
</header>

<main class="dashboard">

    <aside id="timingTower"></aside>

    <section class="centerPanel">

        <div id="trackMap" class="card">
            <h2>Track Map</h2>
        </div>

        <div id="telemetry" class="card">
            <h2>Telemetry</h2>
        </div>

    </section>

    <aside class="rightPanel">

        <div id="raceControl" class="card">
            <h2>Race Control</h2>
        </div>

        <div id="teamRadio" class="card">
            <h2>Team Radio</h2>
        </div>

        <div id="weather" class="card">
            <h2>Weather</h2>
        </div>

        <div id="strategy" class="card">
            <h2>AI Strategy</h2>
        </div>

    </aside>

</main>

<script src="drivers.js"></script>
<script src="telemetry.js"></script>
<script src="weather.js"></script>
<script src="racecontrol.js"></script>
<script src="radio.js"></script>
<script src="script.js"></script>

</body>
</html>
