<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Scuderia Command v1.1.0 Beta</title>
<style>
body{margin:0;font-family:Arial;background:#090909;color:#fff}
header{background:#121212;border-bottom:3px solid #e10600;padding:16px;display:flex;justify-content:space-between;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:330px 1fr 330px;gap:12px;padding:12px}
.card{background:#171717;border:1px solid #333;border-radius:10px;padding:12px}
table{width:100%;border-collapse:collapse}th,td{padding:6px;border-bottom:1px solid #333;text-align:center}
.g{height:10px;background:#333;border-radius:8px;overflow:hidden}.f{height:100%;background:#e10600;width:50%}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style></head><body>
<header><h2>🏎️ Scuderia Command v1.1.0 Beta</h2><div>Race <span id='tm'>00:00:00</span></div></header>
<div class='grid'>
<div class='card'><h3>Timing Tower</h3><table><tr><th>P</th><th>DRV</th><th>Gap</th></tr>
<tr><td>1</td><td>LEC</td><td>Leader</td></tr><tr><td>2</td><td>HAM</td><td>+1.1</td></tr><tr><td>3</td><td>VER</td><td>+2.9</td></tr><tr><td>4</td><td>NOR</td><td>+4.0</td></tr><tr><td>5</td><td>PIA</td><td>+5.5</td></tr></table><p>Foundation for 22-driver tower.</p></div>
<div class='card'><h3>Telemetry</h3><div>Speed <b id=s>290</b> km/h</div><div>RPM <b id=r>11000</b></div><div>Gear <b id=g>7</b></div><div>Throttle<div class='g'><div id=t class='f'></div></div></div><div>ERS <b id=e>81%</b></div></div>
<div class='card'><h3>Race Control / Radio</h3><p id=rc>DRS ENABLED</p><hr><p id=rd>Push now.</p></div>
</div>
<script>
let i=0,msg=['DRS ENABLED','TRACK CLEAR','YELLOW FLAG S2'],rad=['Push now','Recharge','Box this lap'];
setInterval(()=>{i++;tm.textContent=new Date(i*1000).toISOString().substr(11,8);s.textContent=260+Math.floor(Math.random()*70);r.textContent=10000+Math.floor(Math.random()*2500);g.textContent=5+Math.floor(Math.random()*4);let th=Math.floor(Math.random()*100);t.style.width=th+'%';e.textContent=(100-th)+'%';rc.textContent=msg[Math.floor(Math.random()*msg.length)];rd.textContent=rad[Math.floor(Math.random()*rad.length)]},1000);
</script></body></html>
