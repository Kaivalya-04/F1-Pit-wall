<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Scuderia Command v1.0</title>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial,sans-serif}
header{padding:16px;background:#141414;border-bottom:3px solid #d40000}
h1{margin:0;color:#ff3b3b}
.grid{display:grid;grid-template-columns:1fr;gap:12px;padding:12px}
.card{background:#181818;border:1px solid #333;border-radius:10px;padding:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333;text-align:center}
.value{font-size:2rem;color:#00e676}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
<h1>🏎️ Scuderia Command v1.0</h1>
<div>Session: Race | <span id="timer">00:00:00</span></div>
</header>
<div class="grid">
<div class="card">
<h2>Timing Tower</h2>
<table>
<tr><th>P</th><th>Driver</th><th>Gap</th></tr>
<tr><td>1</td><td>LEC</td><td>Leader</td></tr>
<tr><td>2</td><td>HAM</td><td>+1.2</td></tr>
<tr><td>3</td><td>VER</td><td>+3.9</td></tr>
<tr><td>4</td><td>NOR</td><td>+5.7</td></tr>
<tr><td>5</td><td>PIA</td><td>+7.4</td></tr>
</table>
</div>
<div class="card">
<h2>Telemetry</h2>
<div>Speed<div class="value" id="speed">285</div></div>
<div>Gear<div class="value" id="gear">7</div></div>
<div>ERS<div class="value" id="ers">82%</div></div>
</div>
<div class="card">
<h2>Race Control</h2>
<p id="rc">DRS Enabled</p>
</div>
<div class="card">
<h2>Team Radio</h2>
<p id="radio">Push now. Target +0.5.</p>
</div>
</div>
<script>
let s=0;
setInterval(()=>{
s++;
let h=String(Math.floor(s/3600)).padStart(2,"0");
let m=String(Math.floor((s%3600)/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
timer.textContent=`${h}:${m}:${sec}`;
speed.textContent=250+Math.floor(Math.random()*80);
gear.textContent=5+Math.floor(Math.random()*4);
ers.textContent=Math.floor(Math.random()*100)+"%";
},1000);
</script>
</body></html>
